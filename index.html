<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>notes → tickets</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --panel: #171717;
      --panel2: #202020;
      --border: rgba(255,255,255,0.12);
      --text: #f4f1ec;
      --muted: #8b8b8b;
      --accent: #c8f075;
      --red: #ff6b6b;
      --amber: #ffb347;
      --blue: #7eb8f7;
      --mono: "DM Mono", monospace;
      --sans: "DM Sans", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .logo span {
      color: var(--muted);
    }

    .pill {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      background: var(--panel2);
      padding: 6px 12px;
      border-radius: 999px;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #20c997;
      border-radius: 50%;
      margin-right: 7px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 56px);
    }

    .panel {
      padding: 28px;
      border-right: 1px solid var(--border);
    }

    .panel:last-child {
      border-right: none;
    }

    .section-title {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--border);
    }

    .context-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: rgba(200,240,117,0.45);
    }

    textarea {
      min-height: 280px;
      resize: vertical;
      line-height: 1.7;
    }

    .char-count {
      font-family: var(--mono);
      color: #555;
      font-size: 11px;
      margin: 12px 0 20px;
    }

    button {
      cursor: pointer;
    }

    .extract-btn {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .extract-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .prompt-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 13px 14px;
      font-family: var(--mono);
      text-align: left;
      font-size: 12px;
    }

    .prompt-box {
      display: none;
      margin-top: 12px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      color: #aaa;
      white-space: pre-wrap;
      max-height: 260px;
      overflow: auto;
    }

    .prompt-box.visible {
      display: block;
    }

    .empty {
      height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .empty-symbol {
      color: #242424;
      font-size: 70px;
      margin-bottom: 10px;
    }

    .empty p {
      font-family: var(--mono);
      color: #444;
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    .loading {
      display: none;
      height: 70vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .loading.visible {
      display: flex;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .results {
      display: none;
    }

    .results.visible {
      display: block;
    }

    .summary {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.6;
      color: #aaa;
    }

    .stats {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      flex: 1;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-family: var(--mono);
      color: var(--accent);
      font-size: 24px;
      margin-bottom: 2px;
    }

    .stat span {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .ticket {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
    }

    .ticket-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .ticket-id {
      font-family: var(--mono);
      color: #555;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .ticket h3 {
      font-size: 15px;
      line-height: 1.4;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      border-radius: 7px;
      padding: 5px 8px;
      height: fit-content;
      white-space: nowrap;
    }

    .high {
      background: rgba(255,107,107,0.12);
      color: var(--red);
      border: 1px solid rgba(255,107,107,0.25);
    }

    .medium {
      background: rgba(255,179,71,0.12);
      color: var(--amber);
      border: 1px solid rgba(255,179,71,0.25);
    }

    .low {
      background: rgba(126,184,247,0.12);
      color: var(--blue);
      border: 1px solid rgba(126,184,247,0.25);
    }

    .desc {
      color: #999;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: #777;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .risk, .missing {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .risk {
      color: #ff9c9c;
      background: rgba(255,107,107,0.07);
      border: 1px solid rgba(255,107,107,0.15);
    }

    .missing {
      color: #ffd08a;
      background: rgba(255,179,71,0.07);
      border: 1px solid rgba(255,179,71,0.15);
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .mini-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .mini-actions button:hover {
      color: var(--accent);
      border-color: rgba(200,240,117,0.4);
    }

    .subsection {
      margin-top: 22px;
    }

    .subsection h4 {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin-bottom: 10px;
    }

    .subsection li {
      color: #888;
      font-size: 13px;
      margin-left: 18px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .context-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="logo">notes<span> → </span>tickets</div>
    <div class="pill"><span class="dot"></span>demo prototype</div>
  </div>

  <main class="layout">
    <section class="panel">
      <div class="section-title">project context</div>

      <div class="context-grid">
        <div>
          <label>Project / Team</label>
          <input id="ctx-project" value="Backend" />
        </div>

        <div>
          <label>Sprint deadline</label>
          <input id="ctx-deadline" value="May 9" />
        </div>

        <div>
          <label>Team size</label>
          <input id="ctx-team" value="4 engineers" />
        </div>

        <div>
          <label>Current focus</label>
          <input id="ctx-focus" value="auth verification" />
        </div>
      </div>

      <div class="section-title">raw meeting notes</div>

      <textarea id="notes">Backend auth meeting.

New tokens are ready from the platform team, but backend also needs to be updated to work with the new tokens.

Some old admin users have weird legacy roles in the database, might cause permission issues.

We need to understand if old roles should still work or be migrated.

Frontend is waiting for backend confirmation.

May 9 deadline.

Nobody is fully sure who owns the legacy role cleanup.

Need tests before release.</textarea>

      <div class="char-count" id="char-count">0 characters</div>

      <button class="extract-btn" id="extract-btn">↓ Extract tasks</button>

      <button class="prompt-btn" id="prompt-btn">↳ view system prompt</button>
      <div class="prompt-box" id="prompt-box"></div>
    </section>

    <section class="panel">
      <div class="section-title">structured tickets</div>

      <div class="empty" id="empty-state">
        <div class="empty-symbol">∅</div>
        <p>paste notes & extract tasks</p>
      </div>

      <div class="loading" id="loading-state">
        <div class="spinner"></div>
        <p id="loading-text">analysing notes...</p>
      </div>

      <div class="results" id="results">
        <div class="summary" id="summary"></div>

        <div class="stats">
          <div class="stat">
            <strong id="stat-tickets">0</strong>
            <span>tickets</span>
          </div>
          <div class="stat">
            <strong id="stat-high">0</strong>
            <span>high prio</span>
          </div>
          <div class="stat">
            <strong id="stat-risks">0</strong>
            <span>risks</span>
          </div>
        </div>

        <div class="mini-actions">
          <button id="copy-all">copy all</button>
          <button id="export-csv">export CSV</button>
        </div>

        <div id="tickets-container"></div>

        <div class="subsection">
          <h4>flagged decisions</h4>
          <ul id="decisions-list"></ul>
        </div>

        <div class="subsection">
          <h4>not yet tasks</h4>
          <ul id="unactionable-list"></ul>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SYSTEM_PROMPT = `You are a senior engineering lead helping convert raw meeting notes into structured Jira-style tickets.

Your job is not to fully automate project management.
Your job is to structure messy information so a human can review it quickly.

Rules:
1. Do not invent owners, deadlines, or decisions.
2. If something is unclear, flag it as missing information.
3. Separate real tasks from vague discussion.
4. Include risk and missing information fields.
5. Keep output practical and copy-ready for Jira.

Context fields:
Project: {PROJECT}
Sprint deadline: {DEADLINE}
Team size: {TEAM}
Current focus: {FOCUS}`;

    const demoResult = {
      meeting_summary:
        "The meeting focused on updating backend authentication to support new tokens while managing legacy admin roles and unclear ownership.",

      tickets: [
        {
          id: "TASK-001",
          title: "Update backend token validation logic",
          description:
            "Modify the backend authentication flow so it supports the new token format. Definition of done: new tokens are accepted, invalid tokens are rejected, and existing authentication tests still pass.",
          priority: "high",
          owner: "unassigned",
          type: "feature",
          risk:
            "Authentication changes may break login or access control if legacy token behavior is not covered.",
          missing_info:
            "Exact new token format and backwards compatibility requirements are not fully specified.",
          estimated_effort: "M"
        },
        {
          id: "TASK-002",
          title: "Audit legacy admin roles in database",
          description:
            "Review existing admin users with legacy roles and identify which roles may conflict with the new authentication flow. Definition of done: list of affected users and recommended migration action.",
          priority: "high",
          owner: "backend team",
          type: "spike",
          risk:
            "Old admin roles may create permission conflicts after the authentication update.",
          missing_info:
            "No clear list of legacy role types or expected mapping to the new role model.",
          estimated_effort: "M"
        },
        {
          id: "TASK-003",
          title: "Define migration plan for legacy roles",
          description:
            "Create a migration plan for old admin roles before releasing the new token logic. The plan should include affected users, migration rules, and rollback approach.",
          priority: "medium",
          owner: "unassigned",
          type: "chore",
          risk:
            "Without a migration plan, some admin users may lose access or receive incorrect permissions.",
          missing_info:
            "Final decision needed on whether migration should be manual or scripted.",
          estimated_effort: "L"
        },
        {
          id: "TASK-004",
          title: "Add regression tests for authentication changes",
          description:
            "Add tests covering new tokens, invalid tokens, old admin users, and legacy role edge cases. Definition of done: tests run successfully in CI and cover main permission scenarios.",
          priority: "medium",
          owner: "backend team",
          type: "chore",
          risk:
            "Missing tests could allow permission bugs to reach production.",
          missing_info:
            "Need confirmation of the highest-risk legacy role cases.",
          estimated_effort: "M"
        }
      ],

      flagged_decisions: [
        "New token support is required for the backend authentication flow.",
        "Legacy admin roles are a risk and need review before release."
      ],

      unactionable_items: [
        "Some old admin users have weird legacy roles — this is not yet a task until affected roles are identified.",
        "Current notes do not confirm who owns the migration decision."
      ]
    };

    const notes = document.getElementById("notes");
    const charCount = document.getElementById("char-count");
    const extractBtn = document.getElementById("extract-btn");
    const promptBtn = document.getElementById("prompt-btn");
    const promptBox = document.getElementById("prompt-box");
    const emptyState = document.getElementById("empty-state");
    const loadingState = document.getElementById("loading-state");
    const loadingText = document.getElementById("loading-text");
    const results = document.getElementById("results");

    let lastData = null;
    let loadingTimer = null;

    function updateCharCount() {
      charCount.textContent = notes.value.length + " characters";
    }

    function getPrompt() {
      return SYSTEM_PROMPT
        .replace("{PROJECT}", document.getElementById("ctx-project").value || "not specified")
        .replace("{DEADLINE}", document.getElementById("ctx-deadline").value || "not specified")
        .replace("{TEAM}", document.getElementById("ctx-team").value || "not specified")
        .replace("{FOCUS}", document.getElementById("ctx-focus").value || "not specified");
    }

    function showLoading() {
      emptyState.style.display = "none";
      results.classList.remove("visible");
      loadingState.classList.add("visible");
      extractBtn.disabled = true;

      const messages = [
        "parsing structure...",
        "identifying actions...",
        "calibrating priorities...",
        "flagging risks...",
        "almost done..."
      ];

      let i = 0;
      loadingText.textContent = messages[i];

      loadingTimer = setInterval(() => {
        i = (i + 1) % messages.length;
        loadingText.textContent = messages[i];
      }, 400);
    }

    function hideLoading() {
      clearInterval(loadingTimer);
      loadingState.classList.remove("visible");
      extractBtn.disabled = false;
    }

    function renderResults(data) {
      lastData = data;

      const tickets = data.tickets;
      const high = tickets.filter(t => t.priority === "high").length;
      const risks = tickets.filter(t => t.risk).length;

      document.getElementById("summary").textContent = data.meeting_summary;
      document.getElementById("stat-tickets").textContent = tickets.length;
      document.getElementById("stat-high").textContent = high;
      document.getElementById("stat-risks").textContent = risks;

      const container = document.getElementById("tickets-container");
      container.innerHTML = "";

      tickets.forEach(ticket => {
        const card = document.createElement("div");
        card.className = "ticket";

        card.innerHTML = `
          <div class="ticket-top">
            <div>
              <div class="ticket-id">${ticket.id} · ${ticket.type} · ${ticket.estimated_effort}</div>
              <h3>${ticket.title}</h3>
            </div>
            <div class="badge ${ticket.priority}">${ticket.priority}</div>
          </div>

          <p class="desc">${ticket.description}</p>

          <div class="meta">
            <span>owner: ${ticket.owner}</span>
            <span>effort: ${ticket.estimated_effort}</span>
            <span>type: ${ticket.type}</span>
          </div>

          <div class="risk"><strong>risk:</strong> ${ticket.risk}</div>
          <div class="missing"><strong>missing info:</strong> ${ticket.missing_info}</div>
        `;

        container.appendChild(card);
      });

      document.getElementById("decisions-list").innerHTML =
        data.flagged_decisions.map(item => `<li>${item}</li>`).join("");

      document.getElementById("unactionable-list").innerHTML =
        data.unactionable_items.map(item => `<li>${item}</li>`).join("");

      results.classList.add("visible");
    }

    function extractTasks() {
      if (!notes.value.trim()) {
        alert("Paste your meeting notes first.");
        return;
      }

      showLoading();

      setTimeout(() => {
        hideLoading();
        renderResults(demoResult);
      }, 900);
    }

    function copyAll() {
      if (!lastData) return;

      const text = lastData.tickets.map(t => {
        return `${t.id}: ${t.title}
Priority: ${t.priority}
Owner: ${t.owner}
Type: ${t.type}
Effort: ${t.estimated_effort}

${t.description}

Risk: ${t.risk}
Missing info: ${t.missing_info}`;
      }).join("\n\n---\n\n");

      navigator.clipboard.writeText(text);
    }

    function exportCSV() {
      if (!lastData) return;

      const headers = ["ID", "Title", "Priority", "Owner", "Type", "Effort", "Description", "Risk", "Missing Info"];
      const rows = lastData.tickets.map(t => [
        t.id,
        t.title,
        t.priority,
        t.owner,
        t.type,
        t.estimated_effort,
        t.description,
        t.risk,
        t.missing_info
      ]);

      const csv = [headers, ...rows]
        .map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const link = document.createElement("a");
      link.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
      link.download = "notes-to-tickets-output.csv";
      link.click();
    }

    notes.addEventListener("input", updateCharCount);

    extractBtn.addEventListener("click", extractTasks);

    promptBtn.addEventListener("click", () => {
      promptBox.textContent = getPrompt();
      promptBox.classList.toggle("visible");
      promptBtn.textContent = promptBox.classList.contains("visible")
        ? "↳ hide system prompt"
        : "↳ view system prompt";
    });

    document.getElementById("copy-all").addEventListener("click", copyAll);
    document.getElementById("export-csv").addEventListener("click", exportCSV);

    updateCharCount();
  </script>
</body>
</html>
