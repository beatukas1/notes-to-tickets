<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>notes → tickets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0ede8;
      --muted: #888;
      --accent: #c8f075;
      --accent-dim: rgba(200,240,117,0.12);
      --accent-border: rgba(200,240,117,0.3);
      --red: #ff6b6b;
      --amber: #ffb347;
      --blue: #7eb8f7;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', serif;
      --sans: 'DM Sans', sans-serif;
    }

    html, body { height: 100%; }
    body { background: var(--bg); font-family: var(--sans); color: var(--text); overflow: hidden; }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,15,0.97);
      position: relative;
      z-index: 10;
    }
    .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
    .logo span { color: var(--muted); }
    .status-pill {
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border-radius: 20px; background: var(--surface2); border: 1px solid var(--border2);
      color: var(--muted); display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .api-key-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .api-key-wrap label {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.08em; white-space: nowrap;
    }
    .api-key-input {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; padding: 5px 10px; font-family: var(--mono);
      font-size: 12px; color: var(--text); outline: none; width: 220px;
      transition: border-color 0.15s;
    }
    .api-key-input:focus { border-color: var(--accent-border); }
    .api-key-input::placeholder { color: #444; }
    .api-key-saved {
      font-family: var(--mono); font-size: 10px; color: #1D9E75;
      display: none;
    }
    .api-key-saved.show { display: block; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 52px);
    }

    .panel { padding: 1.75rem 2rem; overflow-y: auto; border-right: 1px solid var(--border); }
    .panel:last-child { border-right: none; }

    .panel-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .ctx-field { display: flex; flex-direction: column; gap: 5px; }
    .ctx-field label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
    .ctx-field input, .ctx-field select {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
      padding: 7px 10px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    .ctx-field input:focus, .ctx-field select:focus { border-color: var(--accent-border); }
    .ctx-field select option { background: #1e1e1e; }

    .notes-area {
      width: 100%; min-height: 260px; resize: vertical;
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
      padding: 14px 16px; font-family: var(--mono); font-size: 13px; line-height: 1.7;
      color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 1rem;
    }
    .notes-area:focus { border-color: var(--accent-border); }
    .notes-area::placeholder { color: #444; }

    .char-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .char-count { font-family: var(--mono); font-size: 11px; color: #444; }

    .extract-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px; font-family: var(--mono); font-size: 13px;
      font-weight: 500; letter-spacing: 0.04em; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .extract-btn:hover { opacity: 0.9; }
    .extract-btn:active { transform: scale(0.99); }
    .extract-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .prompt-toggle {
      margin-top: 1rem; padding: 10px 14px; background: transparent;
      border: 1px solid var(--border); border-radius: 6px; color: var(--muted);
      font-family: var(--mono); font-size: 11px; cursor: pointer; width: 100%;
      text-align: left; transition: border-color 0.15s, color 0.15s;
    }
    .prompt-toggle:hover { border-color: var(--border2); color: var(--text); }

    .prompt-viewer {
      margin-top: 8px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; font-family: var(--mono); font-size: 11px;
      line-height: 1.8; color: #666; white-space: pre-wrap; display: none;
      max-height: 220px; overflow-y: auto;
    }
    .prompt-viewer.open { display: block; }
    .prompt-viewer .kw { color: var(--accent); }
    .prompt-viewer .val { color: #aaa; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px; color: #333; text-align: center;
    }
    .empty-state .big { font-family: var(--serif); font-size: 52px; font-style: italic; color: #222; line-height: 1; }
    .empty-state p { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: #333; }

    .loading-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px;
    }
    .loading-state.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px; border: 2px solid var(--border2);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    .results { display: none; }
    .results.visible { display: block; }

    .summary-bar {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; margin-bottom: 1.25rem; display: flex; gap: 20px; align-items: center;
    }
    .stat { text-align: center; }
    .stat .n { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--accent); }
    .stat .l { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-top: 1px; }
    .summary-bar .divider { width: 1px; height: 32px; background: var(--border); }
    .export-row { display: flex; gap: 8px; margin-left: auto; }
    .mini-btn {
      padding: 6px 12px; border: 1px solid var(--border2); border-radius: 6px;
      background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .mini-btn:hover { border-color: var(--accent-border); color: var(--accent); }

    .ticket {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.15s; position: relative;
    }
    .ticket:hover { border-color: var(--border2); }
    .ticket-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .ticket-id { font-family: var(--mono); font-size: 10px; color: #444; letter-spacing: 0.06em; }
    .ticket-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; flex: 1; }
    .badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .p-high { background: rgba(255,107,107,0.12); color: var(--red); border: 1px solid rgba(255,107,107,0.2); }
    .p-medium { background: rgba(255,179,71,0.12); color: var(--amber); border: 1px solid rgba(255,179,71,0.2); }
    .p-low { background: rgba(126,184,247,0.12); color: var(--blue); border: 1px solid rgba(126,184,247,0.2); }
    .ticket-desc { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 10px; }
    .ticket-meta { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .meta-item { font-family: var(--mono); font-size: 10px; color: #555; display: flex; align-items: center; gap: 4px; }
    .meta-item span { color: #888; }
    .risk-block {
      margin-top: 8px; padding: 8px 10px; background: rgba(255,107,107,0.05);
      border: 1px solid rgba(255,107,107,0.1); border-radius: 6px;
      font-family: var(--mono); font-size: 11px; color: #ff6b6b99; display: none;
    }
    .risk-block.has-risk { display: block; }
    .risk-block strong { color: var(--red); }
    .missing-block {
      margin-top: 6px; padding: 8px 10px; background: rgba(255,179,71,0.05);
      border: 1px solid rgba(255,179,71,0.1); border-radius: 6px;
      font-family: var(--mono); font-size: 11px; color: #ffb34799; display: none;
    }
    .missing-block.has-missing { display: block; }
    .missing-block strong { color: var(--amber); }
    .copy-btn {
      position: absolute; top: 10px; right: 10px; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: 4px; background: var(--surface2);
      color: var(--muted); font-family: var(--mono); font-size: 10px;
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
    }
    .ticket:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { border-color: var(--accent-border); color: var(--accent); }

    .error-box {
      background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2);
      border-radius: 8px; padding: 14px 16px; font-family: var(--mono); font-size: 12px;
      color: var(--red); display: none; line-height: 1.6;
    }
    .error-box.visible { display: block; }

    .section-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase; margin: 1.25rem 0 0.75rem;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .flag-item {
      font-family: var(--mono); font-size: 11px; color: #666;
      padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.6;
    }

    @media (max-width: 768px) {
      body { overflow: auto; }
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel { border-right: none; border-bottom: 1px solid var(--border); height: auto; }
      .context-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">notes<span> → </span>tickets</div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="api-key-wrap">
      <label>API KEY</label>
      <input
        class="api-key-input"
        id="api-key"
        type="password"
        placeholder="sk-ant-..."
        oninput="saveKey(this.value)"
        autocomplete="off"
      />
      <span class="api-key-saved" id="key-saved">✓ saved</span>
    </div>
    <div class="status-pill"><div class="status-dot"></div>claude-powered</div>
  </div>
</div>

<div class="layout">

  <!-- LEFT PANEL: Input -->
  <div class="panel">
    <div class="panel-label">project context</div>
    <div class="context-grid">
      <div class="ctx-field">
        <label>Project / Team</label>
        <input type="text" id="ctx-project" placeholder="e.g. Backend API" />
      </div>
      <div class="ctx-field">
        <label>Sprint deadline</label>
        <input type="text" id="ctx-deadline" placeholder="e.g. May 9" />
      </div>
      <div class="ctx-field">
        <label>Team size</label>
        <input type="text" id="ctx-team" placeholder="e.g. 4 engineers" />
      </div>
      <div class="ctx-field">
        <label>Current focus</label>
        <input type="text" id="ctx-focus" placeholder="e.g. auth refactor" />
      </div>
    </div>

    <div class="panel-label" style="margin-top:1.5rem">raw meeting notes</div>
    <textarea
      class="notes-area"
      id="notes"
      placeholder="Paste your raw meeting notes here...

Bullet points, stream-of-consciousness, half-sentences — all fine.
The messier the input, the more useful the output."
    ></textarea>

    <div class="char-row">
      <span class="char-count" id="char-count">0 characters</span>
    </div>

    <button class="extract-btn" id="extract-btn" onclick="extractTasks()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v12M2 8l6 6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Extract tasks
    </button>

    <button class="prompt-toggle" id="prompt-toggle" onclick="togglePrompt()">
      ↳ view system prompt
    </button>
    <div class="prompt-viewer" id="prompt-viewer"></div>
  </div>

  <!-- RIGHT PANEL: Output -->
  <div class="panel" id="output-panel">
    <div class="panel-label">structured tickets</div>

    <div class="empty-state" id="empty-state">
      <div class="big">∅</div>
      <p>paste notes &amp; extract tasks</p>
    </div>

    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <p id="loading-text">analysing notes...</p>
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="results" id="results">
      <div class="summary-bar" id="summary-bar"></div>
      <div id="tickets-container"></div>
    </div>
  </div>

</div>

<script>
  // ─── SYSTEM PROMPT ───────────────────────────────────────────────────────────
  const SYSTEM_PROMPT = `You are a senior engineering lead helping convert raw meeting notes into structured Jira-style tickets.

CONTEXT (use this to calibrate scope and priorities):
Project: {PROJECT}
Sprint deadline: {DEADLINE}
Team size: {TEAM}
Current focus: {FOCUS}

YOUR JOB:
1. Read the raw notes carefully
2. Identify every actionable item — explicit and implied
3. Ignore discussion, context-setting, and status updates unless they imply a task
4. For each task, output a structured ticket

OUTPUT FORMAT — respond ONLY with valid JSON, no markdown, no preamble:
{
  "tickets": [
    {
      "id": "TASK-001",
      "title": "Action verb + specific outcome (max 10 words)",
      "description": "2-3 sentences: what to do, definition of done, any key constraints",
      "priority": "high | medium | low",
      "owner": "person name or 'unassigned'",
      "type": "feature | bug | chore | spike",
      "risk": "specific risk or blocker if any, else null",
      "missing_info": "what's unclear that would block this task, else null",
      "estimated_effort": "S | M | L | XL"
    }
  ],
  "meeting_summary": "One sentence summary of what this meeting was about",
  "flagged_decisions": ["decision that was made but should be documented"],
  "unactionable_items": ["things discussed but not yet tasks"]
}

RULES:
- Titles MUST start with an action verb (Build, Fix, Write, Investigate, Define, etc.)
- Never use vague titles like "discuss X" or "look into Y" — convert to concrete actions
- Priority: high = blocks sprint goal or other tasks, medium = needed this sprint, low = nice to have
- If context fields are empty, make reasonable assumptions and note them
- Flag missing owners explicitly rather than guessing`;

  function buildPrompt(ctx) {
    return SYSTEM_PROMPT
      .replace('{PROJECT}', ctx.project || 'not specified')
      .replace('{DEADLINE}', ctx.deadline || 'not specified')
      .replace('{TEAM}', ctx.team || 'not specified')
      .replace('{FOCUS}', ctx.focus || 'not specified');
  }

  // ─── UI HELPERS ──────────────────────────────────────────────────────────────
  document.getElementById('notes').addEventListener('input', function () {
    document.getElementById('char-count').textContent = this.value.length + ' characters';
  });

  function getContext() {
    return {
      project: document.getElementById('ctx-project').value.trim(),
      deadline: document.getElementById('ctx-deadline').value.trim(),
      team: document.getElementById('ctx-team').value.trim(),
      focus: document.getElementById('ctx-focus').value.trim(),
    };
  }

  function togglePrompt() {
    const viewer = document.getElementById('prompt-viewer');
    const btn = document.getElementById('prompt-toggle');
    viewer.classList.toggle('open');
    btn.textContent = viewer.classList.contains('open') ? '↳ hide system prompt' : '↳ view system prompt';
    if (viewer.classList.contains('open')) {
      const ctx = getContext();
      const prompt = buildPrompt(ctx);
      viewer.innerHTML = prompt
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\{[^}]+\}/g, m => `<span class="kw">${m}</span>`)
        .replace(/(high \| medium \| low|feature \| bug \| chore \| spike|S \| M \| L \| XL)/g,
          m => `<span class="val">${m}</span>`);
    }
  }

  const loadingMessages = [
    'parsing structure...', 'identifying actions...', 'calibrating priorities...', 'flagging risks...', 'almost done...'
  ];
  let loadingInterval;

  function setLoading(on) {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('error-box').classList.remove('visible');
    document.getElementById('extract-btn').disabled = on;

    const ls = document.getElementById('loading-state');
    if (on) {
      ls.classList.add('visible');
      let i = 0;
      loadingInterval = setInterval(() => {
        document.getElementById('loading-text').textContent = loadingMessages[i % loadingMessages.length];
        i++;
      }, 900);
    } else {
      ls.classList.remove('visible');
      clearInterval(loadingInterval);
    }
  }

  function showEmpty() {
    document.getElementById('empty-state').style.display = '';
  }

  // ─── API KEY ─────────────────────────────────────────────────────────────────
  function saveKey(val) {
    if (val.startsWith('sk-ant-') && val.length > 20) {
      sessionStorage.setItem('ntt_key', val);
      document.getElementById('key-saved').classList.add('show');
    } else {
      document.getElementById('key-saved').classList.remove('show');
    }
  }

  function getKey() {
    return document.getElementById('api-key').value.trim()
      || sessionStorage.getItem('ntt_key') || '';
  }

  // on load, restore from session if present
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('ntt_key');
    if (saved) {
      document.getElementById('api-key').value = saved;
      document.getElementById('key-saved').classList.add('show');
    }
  });

  // ─── MAIN API CALL ───────────────────────────────────────────────────────────
  async function extractTasks() {
    const notes = document.getElementById('notes').value.trim();
    if (!notes) { alert('Paste your meeting notes first.'); return; }

    const apiKey = getKey();
    if (!apiKey || !apiKey.startsWith('sk-ant-')) {
      alert('Please enter your Anthropic API key in the top bar.\nGet one at: console.anthropic.com');
      return;
    }

    const ctx = getContext();
    const systemPrompt = buildPrompt(ctx);
    setLoading(true);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Here are my raw meeting notes:\n\n${notes}` }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      setLoading(false);
      renderResults(parsed);
    } catch (err) {
      setLoading(false);
      const eb = document.getElementById('error-box');
      eb.innerHTML = `<strong>Error:</strong> ${esc(err.message || 'Something went wrong. Check your API key and try again.')}`;
      eb.classList.add('visible');
    }
  }

  // ─── RENDER ──────────────────────────────────────────────────────────────────
  function renderResults(data) {
    const tickets = data.tickets || [];
    const high = tickets.filter(t => t.priority === 'high').length;
    const risks = tickets.filter(t => t.risk).length;

    window._lastData = data;

    document.getElementById('summary-bar').innerHTML = `
      <div class="stat"><div class="n">${tickets.length}</div><div class="l">tickets</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="n" style="color:var(--red)">${high}</div><div class="l">high prio</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="n" style="color:var(--amber)">${risks}</div><div class="l">risks</div></div>
      <div class="export-row">
        <button class="mini-btn" onclick="copyAll()">copy all</button>
        <button class="mini-btn" onclick="exportCSV()">export CSV</button>
      </div>
    `;

    let html = '';

    if (data.meeting_summary) {
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:0 4px 14px;line-height:1.7;">
        <span style="color:#444">summary: </span>${esc(data.meeting_summary)}</div>`;
    }

    tickets.forEach((t, i) => {
      const pClass = t.priority === 'high' ? 'p-high' : t.priority === 'low' ? 'p-low' : 'p-medium';
      html += `
      <div class="ticket">
        <button class="copy-btn" onclick="copyTicket(${i})">copy</button>
        <div class="ticket-top">
          <div style="flex:1">
            <div class="ticket-id">${esc(t.id)} · ${esc(t.type || 'task')} · ${esc(t.estimated_effort || 'M')}</div>
            <div class="ticket-title">${esc(t.title)}</div>
          </div>
          <div class="badge ${pClass}">${esc(t.priority)}</div>
        </div>
        <div class="ticket-desc">${esc(t.description)}</div>
        <div class="ticket-meta">
          <div class="meta-item">owner <span>${esc(t.owner || 'unassigned')}</span></div>
        </div>
        <div class="risk-block ${t.risk ? 'has-risk' : ''}"><strong>risk:</strong> ${esc(t.risk || '')}</div>
        <div class="missing-block ${t.missing_info ? 'has-missing' : ''}"><strong>missing info:</strong> ${esc(t.missing_info || '')}</div>
      </div>`;
    });

    if (data.flagged_decisions && data.flagged_decisions.length) {
      html += `<div class="section-label">flagged decisions</div>`;
      data.flagged_decisions.forEach(d => {
        html += `<div class="flag-item">— ${esc(d)}</div>`;
      });
    }

    if (data.unactionable_items && data.unactionable_items.length) {
      html += `<div class="section-label">not yet tasks</div>`;
      data.unactionable_items.forEach(d => {
        html += `<div class="flag-item" style="color:#444">— ${esc(d)}</div>`;
      });
    }

    document.getElementById('tickets-container').innerHTML = html;
    document.getElementById('results').classList.add('visible');
  }

  // ─── EXPORT / COPY ───────────────────────────────────────────────────────────
  function copyTicket(i) {
    const t = (window._lastData?.tickets || [])[i];
    if (!t) return;
    const text = [
      `${t.id}: ${t.title}`,
      `Priority: ${t.priority} | Type: ${t.type} | Effort: ${t.estimated_effort}`,
      `Owner: ${t.owner}`,
      '',
      t.description,
      t.risk ? `\nRisk: ${t.risk}` : '',
      t.missing_info ? `Missing info: ${t.missing_info}` : ''
    ].filter(Boolean).join('\n');
    navigator.clipboard.writeText(text).catch(() => {});
  }

  function copyAll() {
    const data = window._lastData;
    if (!data) return;
    const lines = (data.tickets || []).map(t =>
      `${t.id}: ${t.title}\nPriority: ${t.priority} | ${t.type} | Effort: ${t.estimated_effort}\nOwner: ${t.owner}\n${t.description}\n`
    );
    navigator.clipboard.writeText(lines.join('\n---\n')).catch(() => {});
  }

  function exportCSV() {
    const tickets = window._lastData?.tickets || [];
    const headers = ['ID', 'Title', 'Priority', 'Type', 'Effort', 'Owner', 'Description', 'Risk', 'Missing Info'];
    const rows = [headers, ...tickets.map(t => [
      t.id, t.title, t.priority, t.type, t.estimated_effort,
      t.owner, t.description, t.risk || '', t.missing_info || ''
    ])];
    const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'tickets.csv';
    a.click();
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
